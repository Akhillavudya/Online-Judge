name: CI

# Run the backend test suite on every push to main and on every pull request,
# so a regression is caught before it is merged.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # The judge tests run real submissions; g++ and python3 are both available
      # on ubuntu-latest, but the tests use Python so no extra setup is needed.
      - name: Run tests
        run: pytest
